<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Payment Guardian</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --success: #22c55e;
      --danger: #ef4444;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      background: linear-gradient(135deg, #a5b4fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section {
      margin-bottom: 20px;
    }

    .section h2 {
      margin: 0 0 8px 0;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background-color: var(--surface);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .control-label {
      font-size: 0.95rem;
      font-weight: 500;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #475569;
      transition: .3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--primary);
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    /* Input Field */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background-color: var(--surface);
      color: var(--text);
      font-family: inherit;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: var(--primary);
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      background-color: var(--primary);
      color: white;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    .status-msg {
      font-size: 0.8rem;
      margin-top: 4px;
      min-height: 16px;
    }

    .status-msg.success { color: var(--success); }
    .status-msg.error { color: var(--danger); }

  </style>
</head>
<body>
  <div class="header">
    <h1>AI Payment Guardian</h1>
  </div>

  <div class="section">
    <div class="control-row">
      <span class="control-label">Enable Protection</span>
      <label class="switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <h2>Configuration</h2>
    <div class="input-group">
      <input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key">
      <button id="saveBtn">Save API Key</button>
      <div id="statusMsg" class="status-msg"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
